services:
  # ─── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: radsight-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: radsight
      - key: REDIS_HOST
        fromService:
          type: redis
          name: radsight-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: radsight-redis
          property: port
      - key: REDIS_PASSWORD
        value: ""
      - key: REDIS_DB
        value: "0"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        sync: false
      - key: AI_SERVICE_URL
        value: "http://localhost:8001"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: BACKEND_WORKERS
        value: "1"

  # ─── Analytics Service ────────────────────────────────────────────────────────
  - type: web
    name: radsight-analytics
    env: docker
    dockerfilePath: analytics/Dockerfile
    dockerContext: analytics
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: radsight
      - key: REDIS_HOST
        fromService:
          type: redis
          name: radsight-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: radsight-redis
          property: port
      - key: REDIS_PASSWORD
        value: ""
      - key: ANALYTICS_REDIS_DB
        value: "1"
      - key: WS_BROADCAST_INTERVAL
        value: "10"
      - key: PROPHET_SEASONALITY_MODE
        value: additive
      - key: ANOMALY_CONTAMINATION
        value: "0.05"

  # ─── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: radsight-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all
